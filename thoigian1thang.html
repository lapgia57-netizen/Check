<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Toán Thời Gian Trong Tháng</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f9;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin: 15px 0 8px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e9f7ef;
            border-radius: 8px;
            border-left: 5px solid #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Tính Thời Gian Trong Tháng</h1>
        
        <label>Chọn tháng và năm:</label>
        <input type="month" id="monthInput" value="2026-03">

        <label>Nhập số giờ cần trừ (giờ):</label>
        <input type="number" id="hoursToSubtract" placeholder="Ví dụ: 45" step="0.5" value="0">

        <button onclick="calculateTime()">Tính Toán</button>

        <div id="result" class="result" style="display: none;">
            <!-- Kết quả sẽ hiển thị ở đây -->
        </div>
    </div>

    <script>
        function calculateTime() {
            const monthInput = document.getElementById('monthInput').value;
            const hoursToSubtract = parseFloat(document.getElementById('hoursToSubtract').value) || 0;
            
            if (!monthInput) {
                alert("Vui lòng chọn tháng và năm!");
                return;
            }

            const [year, month] = monthInput.split('-').map(Number);
            
            // Lấy ngày đầu và ngày cuối của tháng
            const firstDay = new Date(year, month - 1, 1);
            const lastDay = new Date(year, month, 0); // Ngày cuối tháng

            // Tính số ngày trong tháng
            const daysInMonth = lastDay.getDate();

            // Tính thời gian tối đa (giả sử làm 24h/ngày)
            const maxHours = daysInMonth * 24;

            // Tính thời gian tối thiểu (giả sử làm 8h/ngày)
            const minHours = daysInMonth * 8;

            // Tính sau khi trừ số giờ nhập vào
            const maxAfterSubtract = Math.max(0, maxHours - hoursToSubtract);
            const minAfterSubtract = Math.max(0, minHours - hoursToSubtract);

            // Hiển thị kết quả
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <h3>Kết quả cho tháng ${month}/${year}</h3>
                <p><strong>Số ngày trong tháng:</strong> ${daysInMonth} ngày</p>
                <p><strong>Thời gian tối đa:</strong> ${maxHours} giờ (${daysInMonth} ngày × 24h)</p>
                <p><strong>Thời gian tối thiểu:</strong> ${minHours} giờ (${daysInMonth} ngày × 8h)</p>
                <hr>
                <p><strong>Sau khi trừ ${hoursToSubtract} giờ:</strong></p>
                <p><strong>Thời gian tối đa còn lại:</strong> ${maxAfterSubtract} giờ</p>
                <p><strong>Thời gian tối thiểu còn lại:</strong> ${minAfterSubtract} giờ</p>
            `;
        }

        // Tự động tính khi thay đổi input
        document.getElementById('monthInput').addEventListener('change', calculateTime);
        document.getElementById('hoursToSubtract').addEventListener('input', calculateTime);

        // Tính ngay khi tải trang
        window.onload = calculateTime;
    </script>
</body>
</html>
