<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Chi Tiêu - GiangND</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2845/2845744.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        
        /* Login Overlay */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #4e73df; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .login-card { background: white; padding: 2rem; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        /* Main UI */
        .summary-card { background: linear-gradient(45deg, #4e73df, #224abe); color: white; border: none; border-radius: 15px; }
        .date-item { transition: transform 0.2s; cursor: pointer; border-radius: 12px; border: 1px solid #e3e6f0; background: white; }
        .date-item:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .icon-circle { width: 45px; height: 45px; background: #e8f0fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #4e73df; }
        #mainContent { display: none; } /* Ẩn nội dung khi chưa login */
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card text-center">
        <div class="mb-4">
            <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
            <h4 class="fw-bold mt-2">Hệ Thống Chi Tiêu</h4>
            <p class="text-muted">Vui lòng đăng nhập để tiếp tục</p>
        </div>
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="userInput" placeholder="Username">
            <label><i class="bi bi-person me-2"></i>Tên đăng nhập</label>
        </div>
        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="passInput" placeholder="Password">
            <label><i class="bi bi-key me-2"></i>Mật khẩu</label>
        </div>
        <button class="btn btn-primary w-100 py-3 fw-bold shadow-sm" onclick="checkLogin()">
            ĐĂNG NHẬP <i class="bi bi-box-arrow-in-right ms-2"></i>
        </button>
        <p id="loginError" class="text-danger mt-3 small" style="display:none;">Sai tài khoản hoặc mật khẩu!</p>
    </div>
</div>

<div id="mainContent" class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0 text-primary"><i class="bi bi-graph-up-arrow me-2"></i>Dashboard</h4>
        <button class="btn btn-sm btn-outline-danger" onclick="location.reload()"><i class="bi bi-power me-1"></i> Thoát</button>
    </div>

    <div class="card summary-card shadow mb-4">
        <div class="card-body text-center py-4">
            <h6 class="text-uppercase mb-2 opacity-75 small fw-bold">Tổng chi tiêu hệ thống</h6>
            <h1 class="display-4 fw-bold" id="grandTotal">0đ</h1>
            <p class="mb-0 small" id="countDays"><i class="bi bi-info-circle me-1"></i>Đang kết nối dữ liệu...</p>
        </div>
    </div>

    <h5 class="mb-3 fw-bold"><i class="bi bi-calendar3-event me-2 text-primary"></i>Lịch sử chi tiêu</h5>
    <div class="row g-3" id="dateList"></div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 bg-light">
                <h5 class="modal-title fw-bold" id="modalDateTitle">Chi tiết</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <ul class="list-group list-group-flush" id="modalItems"></ul>
                <div class="d-flex justify-content-between mt-4 p-3 bg-primary-subtle rounded-3">
                    <span class="fw-bold text-primary">Tổng cộng:</span>
                    <span class="fw-bold text-primary" id="modalDayTotal">0đ</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://khoanchitrongngay-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const chiTieuRef = ref(db, 'chi-tieu');

    let groupedData = {};

    // Hàm Login
    window.checkLogin = () => {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        if(u === 'giangnd' && p === '123456') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadData();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    };

    function loadData() {
        onValue(chiTieuRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            groupedData = {};
            let grandTotal = 0;

            Object.keys(data).forEach(key => {
                const item = data[key];
                const date = item.ngay || "Chưa phân loại";
                if (!groupedData[date]) groupedData[date] = { items: [], total: 0 };
                groupedData[date].items.push(item);
                groupedData[date].total += Number(item.so_tien || 0);
                grandTotal += Number(item.so_tien || 0);
            });

            renderDateCards(groupedData);
            document.getElementById('grandTotal').innerText = grandTotal.toLocaleString() + "đ";
            document.getElementById('countDays').innerHTML = `<i class="bi bi-calendar-check me-1"></i> Dữ liệu từ ${Object.keys(groupedData).length} ngày khác nhau`;
        });
    }

    function renderDateCards(data) {
        const container = document.getElementById('dateList');
        container.innerHTML = "";
        const sortedDates = Object.keys(data).sort((a, b) => new Date(b) - new Date(a));

        sortedDates.forEach(date => {
            const dayInfo = data[date];
            const card = `
                <div class="col-md-6 col-lg-4">
                    <div class="card date-item shadow-sm border-0" onclick="showDetail('${date}')">
                        <div class="card-body d-flex align-items-center p-3">
                            <div class="icon-circle me-3"><i class="bi bi-receipt"></i></div>
                            <div class="flex-grow-1">
                                <div class="text-muted small fw-medium">${date}</div>
                                <div class="fw-bold text-dark h5 mb-0">${dayInfo.total.toLocaleString()}đ</div>
                            </div>
                            <i class="bi bi-chevron-right text-secondary"></i>
                        </div>
                    </div>
                </div>`;
            container.innerHTML += card;
        });
    }

    window.showDetail = (date) => {
        const dayData = groupedData[date];
        document.getElementById('modalDateTitle').innerHTML = `<i class="bi bi-clock-history me-2 text-primary"></i>Ngày ${date}`;
        document.getElementById('modalDayTotal').innerText = dayData.total.toLocaleString() + "đ";
        
        const listContainer = document.getElementById('modalItems');
        listContainer.innerHTML = dayData.items.map(item => `
            <li class="list-group-item d-flex justify-content-between align-items-center px-0 py-3 border-bottom">
                <div>
                    <div class="fw-bold text-dark text-capitalize">${item.ten || item.ghi_chu || 'Chi tiêu'}</div>
                    <span class="badge bg-light text-secondary fw-normal border">${item.loai || 'Khác'}</span>
                </div>
                <span class="text-danger fw-bold">-${Number(item.so_tien).toLocaleString()}đ</span>
            </li>
        `).join('');

        new bootstrap.Modal(document.getElementById('detailModal')).show();
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
