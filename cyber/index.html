<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Games Admin - Pro Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places"></script>
    <style>
        #map { height: 500px; width: 100%; border-radius: 15px; border: 2px solid #ddd; }
        .location-card { cursor: pointer; border-left: 5px solid #0d6efd; transition: 0.3s; }
        .location-card:hover { background: #f8f9fa; transform: scale(1.02); }
        #adminContent { display: none; }
        #loginSection { margin-top: 100px; }
    </style>
</head>
<body class="bg-light">

    <div id="loginSection" class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow-lg p-4">
                <h3 class="text-center mb-4">Quản Trị Viên</h3>
                <input type="text" id="user" class="form-control mb-2" placeholder="Tài khoản">
                <input type="password" id="pass" class="form-control mb-3" placeholder="Mật khẩu">
                <button class="btn btn-primary w-100" onclick="login()">Đăng nhập</button>
            </div>
        </div>
    </div>

    <div id="adminContent" class="container-fluid py-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card shadow-sm p-3">
                    <h5 id="formTitle">📍 Thêm Địa Điểm</h5>
                    <form id="locForm">
                        <input type="hidden" id="locId">
                        <div class="mb-2">
                            <label class="small">Tên Cyber</label>
                            <input type="text" id="locName" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="small">Địa chỉ</label>
                            <input type="text" id="locAddr" class="form-control" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="small">Vĩ độ (Lat)</label>
                                <input type="text" id="lat" class="form-control bg-light" readonly>
                            </div>
                            <div class="col">
                                <label class="small">Kinh độ (Lng)</label>
                                <input type="text" id="lng" class="form-control bg-light" readonly>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100" id="saveBtn">Lưu Tọa Độ</button>
                        <button type="button" class="btn btn-link w-100 text-muted" onclick="resetForm()">Hủy</button>
                    </form>
                </div>
                
                <div id="list" class="mt-3 overflow-auto" style="max-height: 400px;">
                    </div>
            </div>

            <div class="col-md-9">
                <div id="map"></div>
                <div class="alert alert-info mt-2 small">
                    <i class="fas fa-info-circle"></i> Mẹo: Click chuột vào bất kỳ đâu trên bản đồ để lấy tọa độ chính xác.
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <script>
        // 1. Auth & Login
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'user' && p === '123456') {
                sessionStorage.setItem('isLogged', 'true');
                showApp();
            } else alert('Sai thông tin!');
        }

        function showApp() {
            if(sessionStorage.getItem('isLogged')) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                initMap();
            }
        }

        // 2. Firebase & Map
        const firebaseConfig = { databaseURL: "https://project-doidoi-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('cyber_locations');

        let map, mainMarker, markers = [];

        function initMap() {
            const defaultPos = { lat: 10.762622, lng: 106.660172 };
            map = new google.maps.Map(document.getElementById('map'), {
                center: defaultPos, zoom: 13,
                mapTypeControl: false, streetViewControl: false
            });

            // Autocomplete địa chỉ
            const input = document.getElementById('locAddr');
            const searchBox = new google.maps.places.Autocomplete(input);
            searchBox.addListener('place_changed', () => {
                const place = searchBox.getPlace();
                if (place.geometry) updateInputs(place.geometry.location);
            });

            // Click bản đồ lấy tọa độ
            map.addListener('click', (e) => updateInputs(e.latLng));

            loadData();
        }

        function updateInputs(latLng) {
            document.getElementById('lat').value = latLng.lat();
            document.getElementById('lng').value = latLng.lng();
            
            if (mainMarker) mainMarker.setMap(null);
            mainMarker = new google.maps.Marker({
                position: latLng, map: map, animation: google.maps.Animation.BOUNCE
            });
            map.panTo(latLng);
        }

        // 3. Data Processing
        function loadData() {
            db.on('value', snap => {
                const data = snap.val();
                const listDiv = document.getElementById('list');
                listDiv.innerHTML = '';
                markers.forEach(m => m.setMap(null));
                markers = [];

                if(data) {
                    Object.entries(data).forEach(([id, val]) => {
                        // Tạo Card
                        listDiv.innerHTML += `
                            <div class="card p-2 mb-2 location-card shadow-sm" onclick="focusLoc(${val.lat}, ${val.lng})">
                                <div class="d-flex justify-content-between">
                                    <strong>${val.name}</strong>
                                    <span class="text-danger" onclick="deleteLoc('${id}')"><i class="fas fa-times"></i></span>
                                </div>
                                <div class="small text-muted">${val.address}</div>
                                <button class="btn btn-sm btn-outline-primary mt-1" onclick="editLoc('${id}', '${val.name}', '${val.address}', ${val.lat}, ${val.lng})">Sửa</button>
                            </div>
                        `;
                        // Tạo Marker
                        const m = new google.maps.Marker({
                            position: {lat: val.lat, lng: val.lng},
                            map: map, title: val.name
                        });
                        markers.push(m);
                    });
                }
            });
        }

        document.getElementById('locForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('locId').value;
            const data = {
                name: document.getElementById('locName').value,
                address: document.getElementById('locAddr').value,
                lat: parseFloat(document.getElementById('lat').value),
                lng: parseFloat(document.getElementById('lng').value)
            };

            if(id) db.child(id).update(data);
            else db.push(data);
            resetForm();
        };

        window.focusLoc = (la, ln) => {
            map.setZoom(17);
            map.panTo({lat: la, lng: ln});
        };

        window.editLoc = (id, n, a, la, ln) => {
            document.getElementById('locId').value = id;
            document.getElementById('locName').value = n;
            document.getElementById('locAddr').value = a;
            document.getElementById('lat').value = la;
            document.getElementById('lng').value = ln;
            document.getElementById('formTitle').innerText = "📝 Sửa Địa Điểm";
            document.getElementById('saveBtn').innerText = "Cập Nhật Ngay";
        };

        window.deleteLoc = (id) => { if(confirm('Xóa phòng máy này?')) db.child(id).remove(); };

        function resetForm() {
            document.getElementById('locForm').reset();
            document.getElementById('locId').value = '';
            document.getElementById('formTitle').innerText = "📍 Thêm Địa Điểm";
            document.getElementById('saveBtn').innerText = "Lưu Tọa Độ";
            if (mainMarker) mainMarker.setMap(null);
        }

        window.onload = showApp;
    </script>
</body>
</html>
