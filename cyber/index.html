<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Games - Quản lý địa điểm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places"></script>
    <style>
        body { background-color: #f8f9fa; }
        #map { height: 400px; width: 100%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .location-card { transition: 0.3s; cursor: pointer; border: none; border-radius: 10px; }
        .location-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #login-container { max-width: 400px; margin-top: 100px; }
        #main-content { display: none; }
    </style>
</head>
<body>

<div id="login-container" class="container">
    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center"><h5>ĐĂNG NHẬP HỆ THỐNG</h5></div>
        <div class="card-body">
            <input type="text" id="user" class="form-control mb-3" placeholder="Tài khoản">
            <input type="password" id="pass" class="form-control mb-3" placeholder="Mật khẩu">
            <button class="btn btn-dark w-100" onclick="checkLogin()">Đăng nhập</button>
        </div>
    </div>
</div>

<div id="main-content" class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📍 Quản Lý Cyber Games</h2>
        <button class="btn btn-outline-danger btn-sm" onclick="logout()">Thoát</button>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-primary text-white">Thêm / Sửa Địa Điểm</div>
                <div class="card-body">
                    <form id="locationForm">
                        <input type="hidden" id="edit-id">
                        <div class="mb-2">
                            <label class="form-label small">Tên Cyber</label>
                            <input type="text" id="loc-name" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">Địa chỉ</label>
                            <input type="text" id="loc-address" class="form-control" placeholder="Nhập địa chỉ hoặc chọn trên map" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Google Maps Link</label>
                            <input type="text" id="loc-link" class="form-control bg-light" readonly>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="btn-save">Lưu lại</button>
                        <button type="button" class="btn btn-secondary w-100 mt-2" id="btn-cancel" style="display:none;" onclick="resetForm()">Hủy sửa</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div id="map"></div>
        </div>
    </div>

    <h4 class="mt-4 mb-3">🗂️ Danh sách địa điểm đã lưu</h4>
    <div class="row" id="list-container">
        </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<script>
    // 1. CẤU HÌNH LOGIN
    function checkLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'user' && p === '123456') {
            localStorage.setItem('isLogged', 'true');
            showMain();
        } else { alert('Sai tài khoản!'); }
    }
    function logout() { localStorage.removeItem('isLogged'); location.reload(); }
    function showMain() {
        if(localStorage.getItem('isLogged')) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            initMap();
        }
    }

    // 2. CẤU HÌNH FIREBASE
    const firebaseConfig = { databaseURL: "https://project-doidoi-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('cyber-games-locations');

    // 3. XỬ LÝ BẢN ĐỒ & DỮ LIỆU
    let map, marker, markers = [], infoWindow;

    function initMap() {
        const defaultPos = { lat: 10.762622, lng: 106.660172 }; // TP.HCM
        map = new google.maps.Map(document.getElementById('map'), { zoom: 12, center: defaultPos });
        infoWindow = new google.maps.InfoWindow();

        // Autocomplete địa chỉ
        const input = document.getElementById('loc-address');
        const autocomplete = new google.maps.places.Autocomplete(input);
        autocomplete.addListener('place_changed', () => {
            const place = autocomplete.getPlace();
            if (place.geometry) {
                updateSelection(place.geometry.location, place.formatted_address);
                map.setCenter(place.geometry.location);
                map.setZoom(15);
            }
        });

        // Click map để lấy tọa độ
        map.addListener('click', (e) => {
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ location: e.latLng }, (results, status) => {
                if (status === 'OK' && results[0]) {
                    updateSelection(e.latLng, results[0].formatted_address);
                }
            });
        });

        loadSavedData();
    }

    function updateSelection(latLng, address) {
        if (marker) marker.setMap(null);
        marker = new google.maps.Marker({ position: latLng, map: map, animation: google.maps.Animation.BOUNCE });
        document.getElementById('loc-address').value = address;
        document.getElementById('loc-link').value = `https://www.google.com/maps?q=${latLng.lat()},${latLng.lng()}`;
    }

    // TẢI DỮ LIỆU CŨ TỪ FIREBASE
    function loadSavedData() {
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            const listContainer = document.getElementById('list-container');
            listContainer.innerHTML = '';
            
            // Xóa hết marker cũ trên map trước khi vẽ lại
            markers.forEach(m => m.setMap(null));
            markers = [];

            if(data) {
                Object.entries(data).forEach(([id, val]) => {
                    // 1. Tạo Card danh sách
                    listContainer.innerHTML += `
                        <div class="col-md-4 mb-3">
                            <div class="card location-card shadow-sm h-100" onclick="focusMap('${val.mapLink}')">
                                <div class="card-body">
                                    <h6 class="text-primary fw-bold">${val.name}</h6>
                                    <p class="small text-muted mb-2"><i class="fas fa-map-marker-alt"></i> ${val.address}</p>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-sm btn-warning" onclick="event.stopPropagation(); editLoc('${id}','${val.name}','${val.address}','${val.mapLink}')">Sửa</button>
                                        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteLoc('${id}')">Xóa</button>
                                    </div>
                                </div>
                            </div>
                        </div>`;

                    // 2. Cắm Marker lên Map cho mọi địa điểm đã lưu
                    const coords = extractCoords(val.mapLink);
                    if(coords) {
                        const m = new google.maps.Marker({
                            position: coords,
                            map: map,
                            title: val.name,
                            icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'
                        });
                        m.addListener('click', () => {
                            infoWindow.setContent(`<strong>${val.name}</strong><br>${val.address}`);
                            infoWindow.open(map, m);
                        });
                        markers.push(m);
                    }
                });
            } else {
                listContainer.innerHTML = '<p class="text-center text-muted">Chưa có địa điểm nào được lưu.</p>';
            }
        });
    }

    // Hàm hỗ trợ trích xuất tọa độ từ Link
    function extractCoords(link) {
        try {
            const url = new URL(link);
            const q = url.searchParams.get('q').split(',');
            return { lat: parseFloat(q[0]), lng: parseFloat(q[1]) };
        } catch(e) { return null; }
    }

    function focusMap(link) {
        const c = extractCoords(link);
        if(c) { map.setCenter(c); map.setZoom(17); }
    }

    // CRUD: LƯU, SỬA, XÓA
    document.getElementById('locationForm').onsubmit = (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const data = {
            name: document.getElementById('loc-name').value,
            address: document.getElementById('loc-address').value,
            mapLink: document.getElementById('loc-link').value
        };

        if(id) db.child(id).update(data);
        else db.push(data);
        
        resetForm();
    };

    window.editLoc = (id, name, addr, link) => {
        document.getElementById('edit-id').value = id;
        document.getElementById('loc-name').value = name;
        document.getElementById('loc-address').value = addr;
        document.getElementById('loc-link').value = link;
        document.getElementById('btn-save').innerText = "Cập nhật thay đổi";
        document.getElementById('btn-cancel').style.display = "block";
    };

    window.deleteLoc = (id) => { if(confirm('Xóa địa điểm này?')) db.child(id).remove(); };

    function resetForm() {
        document.getElementById('locationForm').reset();
        document.getElementById('edit-id').value = '';
        document.getElementById('btn-save').innerText = "Lưu lại";
        document.getElementById('btn-cancel').style.display = "none";
        if(marker) marker.setMap(null);
    }

    window.onload = showMain;
</script>

</body>
</html>
