<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hệ thống Quản lý Dữ liệu</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #f2f2f7; /* Màu nền iOS nhạt */
            --card-bg: #ffffff;
            --primary: #007aff;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --success: #34c759;
            --border: #e5e5ea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Màn hình Login */
        #loginScreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 340px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .login-card h2 { margin-bottom: 25px; font-size: 22px; font-weight: 700; }
        
        .input-field {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #f9f9f9;
            font-size: 16px; /* Chặn auto-zoom trên iOS */
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Giao diện chính */
        #mainApp { display: none; }

        .app-header {
            background: var(--card-bg);
            padding: 50px 20px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid var(--border);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header-top h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }

        .logout-link { color: var(--primary); font-weight: 500; font-size: 15px; }

        .summary-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .summary-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .summary-item span { display: block; font-size: 20px; font-weight: 700; color: var(--primary); }
        .summary-item label { font-size: 12px; color: var(--text-sub); text-transform: uppercase; font-weight: 600; }

        .container { padding: 15px; }

        .list-title {
            font-size: 17px;
            font-weight: 600;
            margin: 20px 5px 10px;
            color: var(--text-sub);
        }

        /* Data Cards - Tối ưu hiển thị nội dung dài */
        .data-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 0.5px solid var(--border);
            transition: transform 0.1s;
        }

        .data-card:active { transform: scale(0.98); background: #fafafa; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .source-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 7px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .tag-firebase { background: #e1f0ff; color: #007aff; }
        .tag-txt { background: #e8f5e9; color: #34c759; }

        .card-body {
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-main);
            word-wrap: break-word; /* Hiển thị toàn bộ text dài */
            overflow-wrap: break-word;
            white-space: pre-wrap; /* Giữ nguyên xuống dòng nếu có */
        }

        .card-footer {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 0.5px solid #f2f2f7;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-sub);
        }

        /* Floating Action */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,122,255,0.3);
            font-size: 24px;
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h2>Hệ thống Nội bộ</h2>
            <input type="text" id="user" class="input-field" placeholder="Tài khoản">
            <input type="password" id="pass" class="input-field" placeholder="Mật khẩu">
            <button class="btn-primary" onclick="handleLogin()">Đăng nhập</button>
            <p id="error" style="color:red; font-size:13px; margin-top:10px; display:none;">Sai tài khoản hoặc mật khẩu!</p>
        </div>
    </div>

    <div id="mainApp">
        <div class="app-header">
            <div class="header-top">
                <h1>Dữ liệu</h1>
                <span class="logout-link" onclick="handleLogout()">Đăng xuất</span>
            </div>
            <div class="summary-bar">
                <div class="summary-item">
                    <span id="countTotal">0</span>
                    <label>Tổng cộng</label>
                </div>
                <div class="summary-item">
                    <span id="countFirebase" style="color: #34c759;">0</span>
                    <label>Trực tuyến</label>
                </div>
            </div>
        </div>

        <div class="container">
            <h3 class="list-title">DANH SÁCH CHI TIẾT</h3>
            <div id="dataList">
                </div>
        </div>

        <div class="fab" onclick="document.getElementById('fileInput').click()">📄</div>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <script>
        // Cấu hình bảo mật
        const AUTH = { u: 'admin', p: 'topgame98' };
        
        // Firebase (Giữ nguyên cấu hình của bạn)
        const firebaseConfig = { databaseURL: "https://bankvanhungbian-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('tasks');

        let allData = [];

        // Kiểm tra Login
        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === AUTH.u && p === AUTH.p) {
                localStorage.setItem('session', 'active');
                initApp();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function handleLogout() {
            localStorage.removeItem('session');
            location.reload();
        }

        function initApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadFirebase();
        }

        if(localStorage.getItem('session') === 'active') initApp();

        // Xử lý dữ liệu
        function loadFirebase() {
            db.on('value', snap => {
                const data = snap.val();
                const fbItems = data ? Object.entries(data).map(([id, obj]) => ({
                    ...obj, id, source: 'firebase'
                })) : [];
                render(fbItems);
            });
        }

        // Import TXT
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const lines = event.target.result.split('\n').filter(l => l.trim().length > 0);
                const txtItems = lines.map((l, i) => ({
                    title: l.trim(),
                    createdAt: Date.now(),
                    source: 'txt'
                }));
                render(txtItems, true); // Append mode
            };
            reader.readAsText(file);
        });

        function render(items, append = false) {
            const container = document.getElementById('dataList');
            if(!append) allData = items; 
            else allData = [...items, ...allData];

            document.getElementById('countTotal').innerText = allData.length;
            document.getElementById('countFirebase').innerText = allData.filter(i => i.source === 'firebase').length;

            container.innerHTML = allData.map(item => `
                <div class="data-card" onclick="copy('${item.title}')">
                    <div class="card-header">
                        <span class="source-tag tag-${item.source}">${item.source}</span>
                        <span style="font-size:11px; color:#8e8e93;">
                            ${new Date(item.createdAt || Date.now()).toLocaleDateString('vi-VN')}
                        </span>
                    </div>
                    <div class="card-body">${item.title}</div>
                    ${item.description ? `<div class="card-body" style="color:#666; font-size:14px; margin-top:5px;">${item.description}</div>` : ''}
                    <div class="card-footer">
                        <span>Nhấn để copy</span>
                        <span>${item.completed ? '✅ Xong' : '⏳ Chờ'}</span>
                    </div>
                </div>
            `).join('');
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            const toast = document.createElement('div');
            toast.style = "position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:white; padding:10px 20px; border-radius:20px; font-size:14px; z-index:2000;";
            toast.innerText = "Đã sao chép nội dung!";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }
    </script>
</body>
</html>
