<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>📋 Toàn bộ Công việc</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --bg-primary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            line-height: 1.6;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        /* Header */
        .header {
            background: var(--primary);
            color: white;
            padding: 30px 25px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: clamp(1.8em, 5vw, 2.5em);
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            background: rgba(255,255,255,0.2);
            padding: 12px 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            font-weight: 600;
        }

        .stat-number {
            font-size: 1.4em;
            display: block;
        }

        /* Content */
        .content {
            padding: 30px 25px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Task Cards */
        .task-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        }

        .task-card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .task-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-color: #4facfe;
        }

        .task-card:active {
            transform: translateY(-2px);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .task-title {
            font-size: 1.25em;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
            flex: 1;
            margin-right: 12px;
            word-break: break-word;
        }

        .task-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            white-space: nowrap;
        }

        .task-badge.firebase {
            background: rgba(79, 172, 254, 0.15);
            color: #4facfe;
            border: 1px solid rgba(79, 172, 254, 0.3);
        }

        .task-badge.txt {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .task-badge.complete {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.4);
        }

        .task-content {
            margin-bottom: 20px;
            min-height: 60px;
        }

        .task-desc {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.6;
        }

        .task-link {
            display: inline-block;
            color: #4facfe;
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
            padding: 8px 12px;
            background: rgba(79, 172, 254, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(79, 172, 254, 0.2);
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        .task-link:hover,
        .task-link:active {
            background: rgba(79, 172, 254, 0.2);
            transform: translateY(-1px);
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .task-date {
            font-weight: 500;
        }

        /* Empty States */
        .empty-section {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-secondary);
        }

        .empty-emoji {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        /* TXT Import */
        .import-section {
            padding: 30px 25px;
            background: linear-gradient(135deg, #f0fdf4 0%, #f0f9ff 100%);
            border-top: 4px solid #10b981;
            margin-top: 40px;
        }

        .import-title {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 16px;
            color: #166534;
        }

        .import-zone {
            border: 3px dashed #10b981;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(16, 185, 129, 0.05);
        }

        .import-zone:hover,
        .import-zone.dragover {
            border-color: #4facfe;
            background: rgba(79, 172, 254, 0.05);
            transform: scale(1.02);
        }

        .import-emoji {
            font-size: 3.5em;
            margin-bottom: 16px;
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .task-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .content {
                padding: 20px 16px;
            }
            
            .stats {
                gap: 16px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 25px 20px;
            }
            
            .task-card {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📋 Toàn bộ Dữ liệu</h1>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-number" id="totalTasks">0</span>
                    Tổng
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="completeTasks">0</span>
                    ✅ Hoàn thành
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="pendingTasks">0</span>
                    ⏳ Chờ
                </div>
            </div>
        </div>

        <div class="content">
            <!-- Completed Tasks -->
            <div class="section">
                <h2 class="section-title">
                    ✅ <span>Đã Hoàn Thành</span>
                    <span id="completeCount" style="margin-left: auto; font-size: 1em; opacity: 0.8;"></span>
                </h2>
                <div class="task-grid" id="completedSection"></div>
            </div>

            <!-- Pending Tasks -->
            <div class="section">
                <h2 class="section-title">
                    ⏳ <span>Chờ Xử Lý</span>
                    <span id="pendingCount" style="margin-left: auto; font-size: 1em; opacity: 0.8;"></span>
                </h2>
                <div class="task-grid" id="pendingSection"></div>
            </div>

            <!-- TXT Import Section -->
            <div class="import-section">
                <h3 class="import-title">📄 Import TXT bổ sung</h3>
                <div class="import-zone" onclick="fileInput.click()">
                    <div class="import-emoji">📎</div>
                    <h3>Kéo thả hoặc click</h3>
                    <p>Công việc TXT sẽ hiển thị tạm thời</p>
                </div>
                <input type="file" id="fileInput" accept=".txt" style="display: none;">
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            databaseURL: "https://bankvanhungbian-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        firebase.initializeApp(firebaseConfig);
        const tasksRef = firebase.database().ref('tasks');

        let firebaseTasks = [];
        let txtTasks = [];

        // Load Firebase data
        tasksRef.on('value', (snapshot) => {
            const data = snapshot.val();
            firebaseTasks = data ? 
                Object.entries(data).map(([id, task]) => ({
                    id,
                    firebaseId: id,
                    ...task,
                    source: 'firebase'
                })) : [];
            renderAll();
        });

        // File upload
        document.getElementById('fileInput').addEventListener('change', handleFile);
        const importZone = document.querySelector('.import-zone');

        // Drag & drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            importZone.addEventListener(evt, e => e.preventDefault());
        });
        importZone.addEventListener('drop', handleDrop);

        function handleDrop(e) {
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.txt')) parseTxtFile(file);
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (file) parseTxtFile(file);
        }

        function parseTxtFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const lines = e.target.result.split('\n')
                    .map(l => l.trim())
                    .filter(l => l && !l.startsWith('=') && !l.startsWith('-'));
                
                txtTasks = lines.map((line, i) => ({
                    id: `txt_${Date.now()}_${i}`,
                    title: line.startsWith('📋') ? line.slice(2).trim() : line,
                    description: '',
                    completed: false,
                    createdAt: Date.now(),
                    source: 'txt',
                    filename: file.name.slice(0, 20)
                })).filter(t => t.title.length > 1);

                renderAll();
            };
            reader.readAsText(file);
        }

        function renderAll() {
            const allTasks = [...firebaseTasks, ...txtTasks];
            
            // Split: completed first
            const completed = allTasks.filter(t => t.completed).sort((a, b) => b.createdAt - a.createdAt);
            const pending = allTasks.filter(t => !t.completed).sort((a, b) => b.createdAt - a.createdAt);

            renderSection('completedSection', completed);
            renderSection('pendingSection', pending);

            // Update stats
            document.getElementById('totalTasks').textContent = allTasks.length;
            document.getElementById('completeTasks').textContent = completed.length;
            document.getElementById('pendingTasks').textContent = pending.length;
            document.getElementById('completeCount').textContent = `(${completed.length})`;
            document.getElementById('pendingCount').textContent = `(${pending.length})`;
        }

        function renderSection(containerId, tasks) {
            const container = document.getElementById(containerId);
            
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-section">
                        <div class="empty-emoji">${containerId === 'completedSection' ? '🎉' : '⏳'}</div>
                        <h3>${containerId === 'completedSection' ? 'Chưa có công việc hoàn thành' : 'Chưa có công việc nào'}</h3>
                        <p>${containerId === 'completedSection' ? 'Hoàn thành công việc để xem ở đây!' : 'Import TXT hoặc chờ dữ liệu Firebase'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="task-card ${task.completed ? 'complete' : ''}" 
                     onclick="openTask('${task.title.replace(/'/g, "\\'").replace(/"/g, '\\"')}')">
                    <div class="task-header">
                        <div class="task-title">${task.title}</div>
                        <div class="task-badge ${task.source} ${task.completed ? 'complete' : ''}">
                            ${task.source === 'firebase' ? '☁️ LIVE' : '📄 TXT'}
                        </div>
                    </div>
                    ${task.description ? `
                        <div class="task-content">
                            <div class="task-desc">${task.description}</div>
                        </div>
                    ` : ''}
                    <div class="task-meta">
                        <span class="task-date">
                            ${new Date(task.createdAt).toLocaleString('vi-VN', {
                                day: '2-digit',
                                month: '2-digit',
                                year: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            })}
                        </span>
                        <span>${task.completed ? '✅ Hoàn thành' : '⏳ Đang xử lý'}</span>
                    </div>
                </div>
            `).join('');
        }

        function openTask(title) {
            // Detect URLs in title/description
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const urls = title.match(urlRegex);
            
            if (urls && urls.length > 0) {
                // Open first URL
                window.open(urls[0], '_blank');
            } else {
                // Copy to clipboard
                navigator.clipboard.writeText(title).then(() => {
                    showToast('📋 Đã copy! Nhấn giữ để paste hoặc share.');
                }).catch(() => {
                    fallbackCopy(title);
                });
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('📋 Đã copy!');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `
                position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
                background: rgba(0,0,0,0.9); color: white; padding: 16px 24px;
                border-radius: 12px; font-weight: 600; z-index: 10000;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Auto-detect links in real-time
        document.addEventListener('click', e => {
            const link = e.target.closest('.task-link');
            if (link) {
                e.preventDefault();
                window.open(link.href, '_blank');
            }
        }, true);
    </script>
</body>
</html>
